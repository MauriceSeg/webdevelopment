<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<h1>Web Development I</h1>
<a href="../../">Terug naar StartPagina</a> | <a href="../">Terug naar Labo 16</a>
<ul>
    <li><h2>Labo 16</h2></li>
    <li><h3>Opdracht invulformulier</h3></li>
</ul>
<h2>Registration Form</h2>

<form id="registrationForm" action="/submit" method="post">

    <!-- Persoonlijke informatie -->
    <fieldset id="Persoonlijke_informatie">
        <legend>Persoonlijke informatie</legend>
        <label for="firstName">Voornaam*:</label>
        <input type="text" id="firstName" name="firstName" required autofocus>
        <br><br>
        <label for="lastName">Achternaam*:</label>
        <input type="text" id="lastName" name="lastName" required>
    </fieldset>

    <!-- Sport -->
    <fieldset id="Sport">
        <legend>Sport</legend>
        <p>Welke sport beoefen je?</p>
        <input type="checkbox" id="Lopen" name="sport" value="Lopen">
        <label for="Lopen">Lopen</label>
        <br>
        <input type="checkbox" id="Zwemmen" name="sport" value="Zwemmen">
        <label for="Zwemmen">Zwemmen</label>
        <br>
        <input type="checkbox" id="Roeien" name="sport" value="Roeien">
        <label for="Roeien">Roeien</label>
    </fieldset>

    <!-- ZIP Code -->
    <label for="zip">Belgische postcode*:</label>
    <input
            type="text"
            id="zip"
            name="zip"
            pattern="^(1000|100[1-9]|10[1-9][0-9]|1[1-9][0-9]{2}|[2-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])$"
            required
    >
    <span id="zipError" class="error"></span>
    <br><br>

    <!-- Email -->
    <label for="email">Email*:</label>
    <input type="email" id="email" name="email" required>
    <br><br>

    <!-- Gender -->
    <p>Gender:</p>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Man</label>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Vrouw</label>

    <input type="radio" id="X" name="gender" value="X" checked>
    <label for="X">X</label>
    <br><br>

    <!-- Hidden field -->
    <input type="hidden" name="formId" value="registration2025">

    <!-- Submit -->
    <button type="submit" name="save">Save</button>

</form>


</body>
</html>
